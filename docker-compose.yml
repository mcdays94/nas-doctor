services:
  nas-doctor:
    image: ghcr.io/mcdays94/nas-doctor:latest
    container_name: nas-doctor
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true  # Required for smartctl, dmesg, dmidecode
    network_mode: host  # For accurate network diagnostics
    volumes:
      # Persistent data (SQLite database, config)
      - nas-doctor-data:/data
      # Host system access (read-only)
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Docker monitoring
      - /boot:/host/boot:ro                            # Unraid config, parity logs
      - /var/log:/host/log:ro                          # System logs (syslog, messages)
      - /mnt:/host/mnt:ro                              # Host disk mounts (per-disk space)
      - /etc/unraid-version:/etc/unraid-version:ro     # Unraid OS version
    environment:
      - TZ=${TZ:-UTC}
      - NAS_DOCTOR_LISTEN=:8060
      - NAS_DOCTOR_DATA=/data
      - NAS_DOCTOR_INTERVAL=${SCAN_INTERVAL:-6h}
      # Optional: Webhook notifications
      # - NAS_DOCTOR_WEBHOOK_URL=https://discord.com/api/webhooks/xxx/yyy
      # - NAS_DOCTOR_WEBHOOK_TYPE=discord
      # - NAS_DOCTOR_WEBHOOK_MIN_LEVEL=warning
    ports:
      - "8060:8060"
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"  # Auto-update with Watchtower

volumes:
  nas-doctor-data:
    driver: local
