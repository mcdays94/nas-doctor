<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAS Doctor</title>
<link rel="icon" type="image/png" href="/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0f1011;--bg-panel:#191a1b;--bg-elevated:#242526;
  --brand:#5e6ad2;--accent:#7170ff;--hover:#828fff;
  --border:rgba(255,255,255,0.05);--border-hover:rgba(255,255,255,0.08);
  --btn-bg:rgba(255,255,255,0.02);--btn-bg-hover:rgba(255,255,255,0.05);
  --text-primary:#f7f8f8;--text-secondary:#d0d6e0;--text-tertiary:#8a8f98;--text-quaternary:#62666d;
  --green:#27a644;--green-bg:rgba(39,166,68,0.1);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.1);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.1);
  --radius:8px;--sp:8px;
}
html{background:var(--bg-base);color:var(--text-primary);font-family:'Inter',system-ui,-apple-system,sans-serif;font-feature-settings:"cv01","ss03";font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{min-height:100vh;padding:calc(var(--sp)*3)}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--hover)}

.container{max-width:1200px;margin:0 auto}
.container.dash-wide{max-width:none;padding:0 24px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:calc(var(--sp)*2) 0;margin-bottom:0;border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:calc(var(--sp)*2)}
.logo{display:flex;align-items:center;gap:var(--sp);font-size:20px;font-weight:600;letter-spacing:-0.5px;color:var(--text-primary)}
.logo-emoji{font-size:24px}
.hostname{font-size:13px;color:var(--text-tertiary);font-weight:400;padding:4px 10px;background:var(--btn-bg);border:1px solid var(--border);border-radius:var(--radius)}
.header-right{display:flex;align-items:center;gap:16px}
.theme-switcher{display:flex;align-items:center;gap:2px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius);padding:2px}
.theme-switcher a{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;color:var(--text-quaternary);text-decoration:none;transition:all 0.15s ease;line-height:1.3}
.theme-switcher a:hover{color:var(--text-tertiary)}
.theme-switcher a.active{color:var(--text-primary);background:var(--btn-bg-hover);box-shadow:0 1px 2px rgba(0,0,0,0.3)}
.nav-links{display:flex;gap:4px}
.nav-link{padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;color:var(--text-tertiary);border:1px solid transparent;transition:all 0.15s ease;text-decoration:none}
.nav-link:hover{color:var(--text-secondary);background:var(--btn-bg-hover);border-color:var(--border-hover)}
.nav-link.active{color:var(--text-primary);background:var(--btn-bg-hover);border-color:var(--border-hover)}

/* Top bar — compact health + stats */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);gap:calc(var(--sp)*2);min-height:48px;max-height:48px}
.top-bar-health{display:flex;align-items:center;gap:calc(var(--sp)*1.5);flex-shrink:0}
.health-pill{display:flex;align-items:center;gap:8px;padding:4px 14px;border-radius:20px;font-size:13px;font-weight:600}
.health-pill.healthy{background:var(--green-bg);color:var(--green)}
.health-pill.warning{background:var(--amber-bg);color:var(--amber)}
.health-pill.critical{background:var(--red-bg);color:var(--red)}
.health-pill-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.health-pill.healthy .health-pill-dot{background:var(--green)}
.health-pill.warning .health-pill-dot{background:var(--amber)}
.health-pill.critical .health-pill-dot{background:var(--red)}
.health-badges{display:flex;align-items:center;gap:6px;margin-left:4px}
.health-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;line-height:1.3}
.health-badge.badge-red{color:var(--red);background:var(--red-bg)}
.health-badge.badge-amber{color:var(--amber);background:var(--amber-bg)}
.health-badge.badge-brand{color:var(--accent);background:rgba(94,106,210,0.1)}
.top-bar-stats{display:flex;align-items:center;gap:calc(var(--sp)*3)}
.stat-item{display:flex;align-items:baseline;gap:6px;font-size:13px;white-space:nowrap}
.stat-item-label{color:var(--text-quaternary);font-weight:500;font-size:12px}
.stat-item-value{font-weight:600;font-size:14px;letter-spacing:-0.3px}
@media(max-width:700px){
  .top-bar{flex-wrap:wrap;max-height:none;padding:8px 0}
  .top-bar-stats{flex-wrap:wrap;gap:calc(var(--sp)*2)}
}

/* Scan bar — compact */
.scan-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:calc(var(--sp)*2);gap:calc(var(--sp)*2);border-bottom:1px solid var(--border)}
.scan-info{font-size:12px;color:var(--text-quaternary)}
.scan-info strong{color:var(--text-tertiary);font-weight:500}
.refresh-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:4px;opacity:0.5;vertical-align:middle}
.refresh-dot.pulse{animation:refresh-pulse 0.6s ease}
@keyframes refresh-pulse{0%{opacity:1;transform:scale(1.6)}100%{opacity:0.5;transform:scale(1)}}

/* Section titles */
.section-title{font-size:13px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:calc(var(--sp)*1.5);margin-top:0}

/* Two-column layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.col-left{min-width:0;display:flex;flex-direction:column;min-height:0;gap:calc(var(--sp)*3)}
.col-right{min-width:0;display:flex;flex-direction:column;gap:calc(var(--sp)*3)}

/* Sort bar */
.sort-bar{display:inline-flex;gap:1px;padding:0;border-radius:6px;background:none;border:none;opacity:0;transition:opacity 0.2s ease}
.section-block:hover .sort-bar{opacity:1}
.sort-pill{padding:4px 10px;border:none;border-radius:4px;font-size:10px;font-weight:600;font-family:inherit;color:rgba(255,255,255,0.25);background:none;cursor:pointer;transition:all 0.12s;text-transform:uppercase;letter-spacing:0.3px;outline:none;-webkit-appearance:none;appearance:none}
.sort-pill:hover{color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.06)}
.sort-pill.active{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.08)}

/* Section drag-to-reorder */
.section-title-row{display:flex;align-items:center;gap:6px}
.section-drag-handle{
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;
  cursor:grab;opacity:0;transition:opacity 0.15s;color:var(--text-quaternary);
  border-radius:3px;flex-shrink:0;margin-left:-2px;
}
.section-block:hover .section-drag-handle{opacity:0.35}
.section-drag-handle:hover{opacity:1 !important;background:rgba(255,255,255,0.06)}
.section-drag-handle:active{cursor:grabbing}
.section-block.dragging{opacity:0.35;transition:opacity 0.15s}
.section-drop-placeholder{
  border:2px dashed var(--accent);border-radius:calc(var(--radius)*1.5);
  margin-bottom:calc(var(--sp)*3);opacity:0.3;background:rgba(94,106,210,0.04);
  transition:height 0.15s ease;
}

/* Scroll fade overlays */
.sf{position:absolute;pointer-events:none;z-index:2;opacity:0;transition:opacity 0.25s}
.sf-h{top:0;bottom:0;width:40px}
.sf-v{left:0;right:0;height:40px}
.sf-l{left:0;border-radius:inherit}
.sf-r{right:0;border-radius:inherit}
.sf-b{bottom:0;border-radius:inherit}
.sf.show{opacity:1}

/* Section resize */
.section-block{position:relative}
.section-block.sb-resized{overflow:hidden;scrollbar-width:thin;scrollbar-color:var(--border-hover) transparent}
.section-block.sb-resized::-webkit-scrollbar{width:5px}
.section-block.sb-resized::-webkit-scrollbar-track{background:transparent}
.section-block.sb-resized::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:3px}
.sb-handle{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:48px;height:8px;cursor:ns-resize;z-index:3;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s}
.section-block:hover .sb-handle{opacity:1}
.sb-handle::after{content:'';width:32px;height:3px;border-radius:2px;background:var(--border-hover);transition:background 0.15s}
.sb-handle:hover::after{background:var(--text-tertiary)}
.sb-handle:active::after{background:var(--accent)}

/* Findings — compact */
.findings-list{display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto;min-height:0;scrollbar-width:thin;scrollbar-color:var(--border-hover) transparent}
.findings-list::-webkit-scrollbar{width:5px}
.findings-list::-webkit-scrollbar-track{background:transparent}
.findings-list::-webkit-scrollbar-thumb{background:var(--border-hover);border-radius:3px}
.findings-list::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.12)}
.finding{border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:12px;transition:all 200ms ease;position:relative;overflow:hidden}
.swipe-dismiss-bg{position:absolute;top:0;right:0;bottom:0;width:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;background:rgba(220,38,38,0.15);color:var(--red);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;opacity:0;pointer-events:none;z-index:-1;border-radius:8px}
.finding:hover{border-color:rgba(255,255,255,0.10)}
.finding-critical{background:rgba(220,38,38,0.06)}
.finding-critical:hover{background:rgba(220,38,38,0.10)}
.finding-warning{background:rgba(217,119,6,0.06)}
.finding-warning:hover{background:rgba(217,119,6,0.10)}
.finding-info{background:rgba(94,106,210,0.06)}
.finding-info:hover{background:rgba(94,106,210,0.10)}
.finding-ok{background:rgba(16,185,129,0.06)}
.finding-ok:hover{background:rgba(16,185,129,0.10)}
.sev-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;flex-shrink:0}
.sev-dot-critical{background:#dc2626}
.sev-dot-warning{background:#d97706}
.sev-dot-info{background:#5e6ad2}
.sev-dot-ok{background:#27a644}
.finding{cursor:pointer;transition:background 0.15s ease}
.finding-title{font-size:13px;font-weight:600;color:var(--text-primary)}
.finding-desc{font-size:12px;color:var(--text-secondary);line-height:1.45}
.finding-expandable{overflow:hidden;max-height:0;opacity:0;transition:max-height 0.3s ease,opacity 0.3s ease}
.finding.active .finding-expandable{max-height:500px;opacity:1}
.finding-details{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.finding-detail-row{display:flex;gap:8px;font-size:12px}
.finding-detail-label{font-weight:600;color:var(--text-tertiary);min-width:60px;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;padding-top:1px}
.finding-detail-value{color:var(--text-secondary);line-height:1.45}
.finding-detail-value.val-accent{color:var(--accent)}
.finding-detail-value.val-italic{font-style:italic}
.finding-evidence-list{list-style:none;display:flex;flex-direction:column;gap:2px;font-family:'SF Mono',monospace;font-size:11px;color:var(--text-tertiary)}
.finding-meta{display:flex;flex-wrap:wrap;gap:calc(var(--sp)*1.5);font-size:11px;color:var(--text-quaternary);margin-top:6px}
.finding-meta span{display:flex;align-items:center;gap:3px}
.finding-meta strong{color:var(--text-tertiary);font-weight:500}
.finding-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:2px 7px;border-radius:4px}
.finding-tag.sev-critical{color:var(--red);background:var(--red-bg)}
.finding-tag.sev-warning{color:var(--amber);background:var(--amber-bg)}
.finding-tag.sev-info{color:var(--accent);background:rgba(94,106,210,0.1)}
.finding-tag.sev-ok{color:var(--green);background:var(--green-bg)}

/* Tables */
.table-wrap{background:var(--bg-panel);border:1px solid var(--border);border-radius:calc(var(--radius)*1.5);overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg-elevated)}
th{font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.4px;padding:calc(var(--sp)*1.5) calc(var(--sp)*2);text-align:left;border-bottom:1px solid var(--border)}
td{font-size:13px;color:var(--text-secondary);padding:calc(var(--sp)*1.5) calc(var(--sp)*2);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tbody tr:nth-child(even){background:rgba(255,255,255,0.01)}
tbody tr:hover{background:rgba(255,255,255,0.03)}
.td-healthy{color:var(--green)}
.td-warn{color:var(--amber)}
.td-crit{color:var(--red)}

/* Disk bars — compact */
.disk-list{display:flex;flex-direction:column;gap:8px}
.disk-item{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px}
.disk-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.disk-name{font-size:12px;font-weight:600;color:var(--text-primary)}
.disk-info{font-size:11px;color:var(--text-quaternary)}
.disk-bar-bg{height:8px;background:var(--bg-elevated);border-radius:4px;overflow:hidden}
.disk-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}

/* Ghost button */
.ghost-btn{display:inline-flex;align-items:center;gap:var(--sp);padding:6px 14px;background:var(--btn-bg);border:1px solid var(--border-hover);border-radius:var(--radius);color:var(--text-secondary);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s ease}
.ghost-btn:hover{background:var(--btn-bg-hover);border-color:rgba(255,255,255,0.12);color:var(--text-primary)}
.ghost-btn:active{transform:scale(0.98)}
.ghost-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.ghost-btn.scanning{color:var(--accent)}

/* Empty state */
.empty{text-align:center;padding:calc(var(--sp)*6);color:var(--text-quaternary);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:calc(var(--sp)*1.5);opacity:0.5}

/* Status dot */
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.status-dot.running{background:var(--green)}
.status-dot.exited{background:var(--red)}
.status-dot.paused{background:var(--amber)}
.status-dot.unknown{background:var(--text-quaternary)}
.td-unknown{color:var(--text-quaternary)}

/* Utility */
.text-green{color:var(--green)}.text-amber{color:var(--amber)}.text-red{color:var(--red)}.text-brand{color:var(--accent)}

/* Fade in animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease both}

/* Loading spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border-hover);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="empty" style="padding:80px 0">
    <div class="spinner" style="width:24px;height:24px;margin:0 auto 16px"></div>
    <div>Loading dashboard...</div>
  </div>
</div>

<script src="/js/charts.js"></script>
<script>
(function(){
  "use strict";
  var cachedSnapshot = null;

  var POLL_MS = 60000;          // status-only poll interval (60s)
  var SCAN_POLL_MS = 15000;     // faster status poll while scan is running (15s)
  var pollTimer = null;
  var statusData = null;
  var snapshotData = null;
  var scanInProgress = false;
  var _lastScanTime = null;
  var _wasScanRunning = false;

  function esc(s) {
    if (!s && s !== 0) return "";
    var d = document.createElement("div");
    d.appendChild(document.createTextNode(String(s)));
    return d.innerHTML;
  }

  function fmtBytes(b) {
    if (!b || b <= 0) return "0 B";
    var units = ["B", "KB", "MB", "GB", "TB"];
    var i = 0;
    while (b >= 1024 && i < units.length - 1) { b /= 1024; i++; }
    return b.toFixed(i === 0 ? 0 : 1) + " " + units[i];
  }

  var _chartRange = 1; // will be overwritten from server settings

  function _renderContainerCard(cm, idx) {
    var h = '';
    var cpuClass = cm.cpu_percent > 200 ? 'td-crit' : cm.cpu_percent > 80 ? 'td-warn' : 'td-healthy';
    var memClass = cm.mem_percent > 95 ? 'td-crit' : cm.mem_percent > 80 ? 'td-warn' : 'td-healthy';
    h += '<div style="background:var(--bg-panel);border:1px solid var(--border);border-radius:calc(var(--radius)*1.5);padding:12px;margin-bottom:6px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    h += '<span style="font-weight:600;font-size:13px;color:var(--text-primary)">' + esc(cm.name) + '</span>';
    h += '<span style="font-size:11px;color:var(--text-quaternary);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(cm.image) + '</span>';
    h += '</div>';
    h += '<div style="display:flex;gap:16px;font-size:12px;color:var(--text-tertiary);flex-wrap:wrap;margin-bottom:8px">';
    h += '<span class="' + cpuClass + '">CPU: <strong>' + (cm.cpu_percent || 0).toFixed(1) + '%</strong></span>';
    h += '<span class="' + memClass + '">Mem: <strong>' + (cm.mem_mb || 0).toFixed(0) + ' MB (' + (cm.mem_percent || 0).toFixed(1) + '%)</strong></span>';
    if (cm.net_in_bytes > 0 || cm.net_out_bytes > 0) h += '<span>Net: <strong style="color:var(--text-primary)">' + fmtBytes(cm.net_in_bytes) + ' / ' + fmtBytes(cm.net_out_bytes) + '</strong></span>';
    if (cm.block_read_bytes > 0 || cm.block_write_bytes > 0) h += '<span>Disk: <strong style="color:var(--text-primary)">' + fmtBytes(cm.block_read_bytes) + ' / ' + fmtBytes(cm.block_write_bytes) + '</strong></span>';
    h += '</div>';
    h += '<canvas id="cmetrics-chart-' + idx + '" data-container="' + esc(cm.name) + '" style="width:100%;height:60px"></canvas>';
    h += '</div>';
    return h;
  }

  function fetchJSON(url) {
    return fetch(url).then(function(r) {
      if (!r.ok) throw new Error(r.status + " " + r.statusText);
      return r.json();
    });
  }

  function loadAll() {
    return Promise.all([
      fetchJSON("/api/v1/status").then(function(d) { statusData = d; }).catch(function() { statusData = null; }),
      fetchJSON("/api/v1/snapshot/latest").then(function(d) { snapshotData = d; }).catch(function() { snapshotData = null; })
    ]).then(render);
  }

  // Lightweight status-only poll — only fetches full snapshot when data changes
  function pollStatus() {
    fetchJSON("/api/v1/status").then(function(d) {
      statusData = d;
      var scanTime = d.last_scan || null;
      var scanRunning = !!d.scan_running;

      // New scan data available — fetch full snapshot and re-render
      if (scanTime && scanTime !== _lastScanTime && _lastScanTime !== null) {
        _lastScanTime = scanTime;
        fetchJSON("/api/v1/snapshot/latest").then(function(snap) {
          snapshotData = snap;
          render();
        }).catch(function() {});
      } else {
        if (!_lastScanTime) _lastScanTime = scanTime;
      }

      // Adjust poll speed based on scan state
      if (scanRunning !== _wasScanRunning) {
        _wasScanRunning = scanRunning;
        startPoll();
      }
    }).catch(function() {});
  }

  function startPoll() {
    if (pollTimer) clearInterval(pollTimer);
    var ms = _wasScanRunning ? SCAN_POLL_MS : POLL_MS;
    pollTimer = setInterval(pollStatus, ms);
  }

  function triggerScan() {
    if (scanInProgress) return;
    scanInProgress = true;
    render();
    fetch("/api/v1/scan", { method: "POST" })
      .then(function(r) { return r.json(); })
      .then(function() {
        setTimeout(function() {
          scanInProgress = false;
          loadAll();
        }, 5000);
      })
      .catch(function() {
        scanInProgress = false;
        render();
      });
  }

  function colorForPct(pct) {
    if (pct >= 90) return "var(--red)";
    if (pct >= 75) return "var(--amber)";
    return "var(--green)";
  }

  function classForPct(pct) {
    if (pct >= 90) return "text-red";
    if (pct >= 75) return "text-amber";
    return "text-green";
  }

  function formatUptime(s) {
    if (!s) return "N/A";
    if (typeof s === "string") return s;
    var days = Math.floor(s / 86400);
    var hours = Math.floor((s % 86400) / 3600);
    if (days > 0) return days + "d " + hours + "h";
    var mins = Math.floor((s % 3600) / 60);
    return hours + "h " + mins + "m";
  }

  function render() {
    var st = statusData;
    var sn = snapshotData;
    cachedSnapshot = sn;
    var hostname = (st && st.hostname) ? st.hostname : (sn && sn.system ? sn.system.hostname : "Unknown");
    var health = (st && st.overall_health) ? st.overall_health : "healthy";
    var critCount = st ? (st.critical_count || 0) : 0;

  function renderSparklines() {
    fetch("/api/v1/sparklines")
      .then(function(r) { return r.json(); })
      .then(function(data) {
        // System sparklines
        if (data.system && data.system.length >= 2 && window.NasChart) {
          var cpuData = data.system.map(function(p) { return p.cpu_usage; });
          var memData = data.system.map(function(p) { return p.mem_percent; });
          var ioData = data.system.map(function(p) { return p.io_wait; });
          try { NasChart.sparkline("spark-cpu", { data: cpuData, color: "#5e6ad2", width: 48, height: 20 }); } catch(e) {}
          try { NasChart.sparkline("spark-mem", { data: memData, color: "#7170ff", width: 48, height: 20 }); } catch(e) {}
          try { NasChart.sparkline("spark-io", { data: ioData, color: "#f59e0b", width: 48, height: 20 }); } catch(e) {}
        }
        // SMART temperature sparklines
        if (data.disks && window.NasChart) {
          var smart = cachedSnapshot ? (cachedSnapshot.smart || []) : [];
          for (var i = 0; i < smart.length; i++) {
            var serial = smart[i].serial || "";
            var diskData = null;
            for (var d = 0; d < data.disks.length; d++) {
              if (data.disks[d].serial === serial) { diskData = data.disks[d]; break; }
            }
            if (diskData && diskData.temps && diskData.temps.length >= 2) {
              var temps = diskData.temps.map(function(p) { return p.temp; });
              var maxT = Math.max.apply(null, temps);
              var color = maxT >= 55 ? "#ef4444" : maxT >= 45 ? "#f59e0b" : "#22c55e";
              try { NasChart.sparkline("spark-temp-" + i, { data: temps, color: color, width: 70, height: 24 }); } catch(e) {}
            }
          }
        }
      })
      .catch(function() {});
    // Load charts using persisted range from server settings
    _chartRange = (statusData && statusData.chart_range_hours) || 1;
    loadGPUChart(_chartRange);
    loadContainerChart(_chartRange);
    loadSpeedTestChart(_chartRange);
  }

  function distributeSections() {
    var staging = document.getElementById("section-staging");
    var colL = document.getElementById("col-left");
    var colR = document.getElementById("col-right");
    if (!staging || !colL || !colR) return;

    var sec = (statusData && statusData.sections) ? statusData.sections : {};

    // Dashboard columns: 0=auto(2), 1, 2, 3, 4
    var numCols = sec.dash_columns || 2;
    if (numCols < 1) numCols = 2;
    var container = document.querySelector(".container");
    var twoCol = document.getElementById("two-col");
    if (numCols >= 3 && container) container.classList.add("dash-wide");
    else if (container) container.classList.remove("dash-wide");
    if (twoCol) twoCol.style.gridTemplateColumns = "repeat(" + numCols + ", 1fr)";

    // Collect all column divs
    var colL = document.getElementById("col-left");
    var colR = document.getElementById("col-right");
    var allCols = [colL, colR];
    for (var ci = 3; ci <= numCols; ci++) {
      var extraCol = document.getElementById("col-" + ci);
      if (extraCol) allCols.push(extraCol);
    }
    var sectionMap = {
      "findings": sec.findings !== false,
      "drives": sec.disk_space !== false || sec.smart !== false,
      "docker": sec.docker !== false,
      "container_metrics": sec.container_metrics !== false,
      "zfs": sec.zfs !== false,
      "gpu": sec.gpu !== false,
      "ups": sec.ups !== false,
      "backup": sec.backup !== false,
      "services": true,
      "network": sec.network !== false,
      "speedtest": sec.speedtest !== false,
      "tunnels": sec.tunnels !== false,
      "proxmox": sec.proxmox !== false,
      "kubernetes": sec.kubernetes !== false,
      "k8s_nodes": sec.kubernetes !== false,
      "k8s_problems": sec.kubernetes !== false,
      "k8s_deployments": sec.kubernetes !== false,
      "k8s_events": sec.kubernetes !== false,
      "parity": sec.parity !== false
    };

    var blocks = staging.querySelectorAll(".section-block");
    if (blocks.length === 0) return;

    // Build a map of section name → element
    var blockMap = {};
    var visibleItems = [];
    for (var i = 0; i < blocks.length; i++) {
      var name = blocks[i].getAttribute("data-section");
      // Dynamic K8s per-node sections follow the kubernetes toggle
      var resolved = sectionMap[name];
      if (resolved === undefined && name && name.indexOf("k8s_node_") === 0) resolved = sec.kubernetes !== false;
      if (resolved === false) continue;
      if (blocks[i].offsetHeight < 10) continue;
      blockMap[name] = blocks[i];
      visibleItems.push({ el: blocks[i], name: name, h: blocks[i].offsetHeight });
    }

    // Pass server-saved section order to NasDrag
    window._serverSectionOrder = (statusData && statusData.section_order) || null;

    // Apply saved order or default height-balanced distribution across N columns
    if (!window.NasDrag || !NasDrag.applySavedOrder(blockMap, visibleItems, allCols)) {
      var colHeights = allCols.map(function() { return 0; });
      for (var j = 0; j < visibleItems.length; j++) {
        var minIdx = 0;
        for (var k = 1; k < colHeights.length; k++) {
          if (colHeights[k] < colHeights[minIdx]) minIdx = k;
        }
        allCols[minIdx].appendChild(visibleItems[j].el);
        colHeights[minIdx] += visibleItems[j].h;
      }
    }

    staging.parentNode.removeChild(staging);

    // Init all interactive features after DOM update
    if (window.NasDrag) NasDrag.init();
    if (window.NasSwipe) NasSwipe.init();
    initSortBars();
    NasScrollFade.init();
  }

  window.NasScrollFade = {
    _done: [],
    _heights: {},       // current tracked heights {key: px}
    _saveTimer: null,
    init: function() {
      for (var i = 0; i < this._done.length; i++) { try { this._done[i](); } catch(e) {} }
      this._done = [];
      // Load persisted heights from server
      this._heights = (statusData && statusData.section_heights) ? JSON.parse(JSON.stringify(statusData.section_heights)) : {};
      // Horizontal scroll fades
      var candidates = document.querySelectorAll('.table-wrap, .table-container, [style*="overflow-x:auto"], [style*="overflow-x: auto"]');
      for (var j = 0; j < candidates.length; j++) this._setupH(candidates[j]);
      // Vertical resize on section blocks
      var blocks = document.querySelectorAll('.section-block');
      for (var k = 0; k < blocks.length; k++) {
        if (blocks[k].offsetHeight > 60) this._setupV(blocks[k]);
      }
    },
    _bg: function(el) {
      for (var n = el; n && n !== document.body; n = n.parentElement) {
        var bg = getComputedStyle(n).backgroundColor;
        if (bg && bg !== 'rgba(0, 0, 0, 0)' && bg !== 'transparent') return bg;
      }
      return getComputedStyle(document.body).backgroundColor || '#0a0a1a';
    },
    _saveHeights: function() {
      var self = this;
      if (self._saveTimer) clearTimeout(self._saveTimer);
      self._saveTimer = setTimeout(function() {
        fetch("/api/v1/settings/section-heights", { method: "PUT", headers: {"Content-Type":"application/json"}, body: JSON.stringify(self._heights) }).catch(function() {});
      }, 500);
    },
    _setupH: function(scrollEl) {
      if (scrollEl._sfH) return; scrollEl._sfH = true;
      var hasBg = getComputedStyle(scrollEl).backgroundColor;
      var container = (hasBg && hasBg !== 'rgba(0, 0, 0, 0)' && hasBg !== 'transparent') ? scrollEl : scrollEl.parentElement;
      var bg = this._bg(container);
      container.style.position = 'relative';
      var fL = document.createElement('div'); fL.className = 'sf sf-h sf-l';
      var fR = document.createElement('div'); fR.className = 'sf sf-h sf-r';
      fL.style.background = 'linear-gradient(to right, ' + bg + ', transparent)';
      fR.style.background = 'linear-gradient(to left, ' + bg + ', transparent)';
      container.appendChild(fL); container.appendChild(fR);
      var update = function() {
        fL.classList.toggle('show', scrollEl.scrollLeft > 2);
        fR.classList.toggle('show', scrollEl.scrollWidth - scrollEl.clientWidth - scrollEl.scrollLeft > 2);
      };
      scrollEl.addEventListener('scroll', update, { passive: true });
      update();
      if (window.ResizeObserver) new ResizeObserver(update).observe(scrollEl);
      this._done.push(function() { fL.remove(); fR.remove(); });
    },
    _setupV: function(block) {
      if (block._sfV) return; block._sfV = true;
      var self = this;
      var key = block.getAttribute('data-section') || ('blk-' + Math.random().toString(36).slice(2, 8));
      var bg = this._bg(block);
      var fB = document.createElement('div'); fB.className = 'sf sf-v sf-b';
      fB.style.background = 'linear-gradient(to top, ' + bg + ', transparent)';
      block.appendChild(fB);
      var handle = document.createElement('div'); handle.className = 'sb-handle';
      block.appendChild(handle);
      // Restore persisted height
      if (self._heights[key]) {
        block.classList.add('sb-resized');
        block.style.height = self._heights[key] + 'px';
        block.style.overflow = 'hidden';
      }
      var startY, startH;
      function onMove(e) {
        var dy = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
        block.style.height = Math.max(60, startH + dy) + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onUp);
        document.body.style.userSelect = '';
        document.body.style.cursor = '';
        // Persist the new height
        var h = parseInt(block.style.height);
        if (h > 0) { self._heights[key] = h; } else { delete self._heights[key]; }
        self._saveHeights();
        updateFade();
      }
      function onDown(e) {
        e.preventDefault();
        startY = e.touches ? e.touches[0].clientY : e.clientY;
        startH = block.offsetHeight;
        if (!block.classList.contains('sb-resized')) {
          block.classList.add('sb-resized');
          block.style.height = startH + 'px';
          block.style.overflow = 'hidden';
        }
        document.body.style.userSelect = 'none';
        document.body.style.cursor = 'ns-resize';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('touchend', onUp);
      }
      handle.addEventListener('mousedown', onDown);
      handle.addEventListener('touchstart', onDown, { passive: false });
      handle.addEventListener('dblclick', function() {
        block.classList.remove('sb-resized');
        block.style.height = ''; block.style.overflow = '';
        delete self._heights[key];
        self._saveHeights();
        updateFade();
      });
      function updateFade() {
        var overflows = block.classList.contains('sb-resized') && block.scrollHeight > block.clientHeight + 4;
        fB.classList.toggle('show', overflows);
        if (overflows) block.style.overflow = 'auto';
      }
      block.addEventListener('scroll', function() { updateFade(); }, { passive: true });
      if (window.ResizeObserver) new ResizeObserver(updateFade).observe(block);
      updateFade();
      this._done.push(function() { fB.remove(); handle.remove(); block.classList.remove('sb-resized'); block.style.height = ''; block.style.overflow = ''; });
    }
  };

  // Restore persisted severity filters
  try { window._findingSevFilters = JSON.parse(localStorage.getItem("nas-doctor-sev-filters")) || {}; } catch(e) { window._findingSevFilters = {}; }
  window._toggleSevFilter = function(sev) {
    window._findingSevFilters[sev] = !window._findingSevFilters[sev];
    if (!window._findingSevFilters[sev]) delete window._findingSevFilters[sev];
    try { localStorage.setItem("nas-doctor-sev-filters", JSON.stringify(window._findingSevFilters)); } catch(e) {}
    render(); distributeSections();
  };
  window._clearSevFilters = function() {
    window._findingSevFilters = {};
    try { localStorage.removeItem("nas-doctor-sev-filters"); } catch(e) {}
    render(); distributeSections();
  };

  window._dismissFinding = function(title, skipReload) {
    fetch("/api/v1/findings/dismiss", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({title: title}) })
      .then(function() { if (!skipReload) loadAll(); })
      .catch(function() {});
  };

  window._toggleFinding = function(el) {
    var all = document.querySelectorAll(".finding");
    for (var i = 0; i < all.length; i++) {
      if (all[i] !== el) all[i].classList.remove("active");
    }
    el.classList.toggle("active");
  };

  window._triggerScan = triggerScan;

  function initSortBars() {
    if (!window.NasSort) return;
    var prefs = NasSort.getPrefs();

    // Findings sort bar
    var findingsMount = document.getElementById("findings-sort-mount");
    if (findingsMount) {
      NasSort.renderSortBar({
        container: findingsMount,
        options: [
          { key: "severity", label: "Severity" },
          { key: "date", label: "Newest" },
          { key: "category", label: "Category" }
        ],
        active: prefs.findings || "severity",
        onSort: function(key) { prefs.findings = key; NasSort.savePrefs(prefs); loadAll(); }
      });
    }

    // Drives sort bar
    var drivesMount = document.getElementById("drives-sort-mount");
    if (drivesMount) {
      NasSort.renderSortBar({
        container: drivesMount,
        options: [
          { key: "device", label: "Device" },
          { key: "temp", label: "Temp" },
          { key: "age", label: "Age" },
          { key: "size", label: "Size" },
          { key: "health", label: "Health" }
        ],
        active: prefs.drives || "device",
        onSort: function(key) { prefs.drives = key; NasSort.savePrefs(prefs); loadAll(); }
      });
    }
  }

  // Refresh indicator
  var _lastFetchTime = 0;
  var _origLoadAll = loadAll;
  loadAll = function() {
    return _origLoadAll().then(function() {
      _lastFetchTime = Date.now();
      var dot = document.getElementById("refresh-dot");
      if (dot) {
        dot.classList.remove("pulse");
        void dot.offsetWidth; // force reflow
        dot.classList.add("pulse");
      }
    });
  };
  var _origPollStatus = pollStatus;
  pollStatus = function() {
    _origPollStatus();
    _lastFetchTime = Date.now();
  };
  setInterval(function() {
    var el = document.getElementById("refresh-ago");
    if (!el || !_lastFetchTime) return;
    var secs = Math.round((Date.now() - _lastFetchTime) / 1000);
    if (secs < 5) el.textContent = "just now";
    else if (secs < 60) el.textContent = secs + "s ago";
    else el.textContent = Math.floor(secs / 60) + "m ago";
  }, 1000);

  // Initial load — sort bars and swipe are inited inside distributeSections()
  loadAll().then(startPoll);
})();
</script>
</body>
</html>
