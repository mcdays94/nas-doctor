<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NAS Doctor</title>
<link rel="icon" href="/icon.png">
<link rel="stylesheet" href="/css/shared.css">
<style>
/* Stats-specific: drives, charts, SMART tables */
body{padding:0}
.stats-container{max-width:1200px;margin:0 auto;padding:24px}
.header-left img{width:28px;height:28px;border-radius:6px}
/* Additional tokens for stats page */
:root,body.theme-midnight{--elevated:#242526;--text3:#5a5f6a}
body.theme-clean{--elevated:#fafafa;--text3:#b3b3b3}
body.theme-clean .drive,.theme-clean .summary-box,.theme-clean .chart-card,.theme-clean .smart-table{box-shadow:0 0 0 1px rgba(0,0,0,0.08)}
body.theme-clean .drive:hover{box-shadow:0 0 0 1px rgba(0,0,0,0.15)}
.summary{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.summary-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:100px;text-align:center}
.summary-val{font-size:22px;font-weight:600}
.summary-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.val-green{color:var(--green)}.val-amber{color:var(--amber)}.val-red{color:var(--red)}
/* Drive list — single column to avoid row-stretch bug */
.drives{display:flex;flex-direction:column;gap:12px;margin-bottom:32px}
.drive{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color 0.15s}
.drive-clickable{cursor:pointer}
.drive-clickable:hover{border-color:rgba(255,255,255,0.15)}
.drive-row{display:flex;align-items:center;gap:12px;padding:14px 16px}
.drive-score{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;border:2px solid}
.score-good{border-color:var(--green);color:var(--green);background:rgba(39,166,68,0.08)}
.score-warn{border-color:var(--amber);color:var(--amber);background:rgba(217,119,6,0.08)}
.score-crit{border-color:var(--red);color:var(--red);background:rgba(220,38,38,0.08)}
.drive-info{flex:1;min-width:0}
.drive-name{font-size:14px;font-weight:600}
.drive-model{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.drive-meta{display:flex;gap:12px;font-size:12px;color:var(--text2);margin-top:3px;flex-wrap:wrap}
.drive-meta strong{color:var(--text)}
.drive-badges{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:9999px;text-transform:uppercase;letter-spacing:0.3px}
.badge-ok{background:rgba(39,166,68,0.1);color:var(--green)}
.badge-warn{background:rgba(217,119,6,0.1);color:var(--amber)}
.badge-crit{background:rgba(220,38,38,0.1);color:var(--red)}
.badge-type{background:rgba(94,106,210,0.1);color:var(--accent)}
.drive-chevron{color:var(--text3);font-size:18px;transition:transform 0.2s;flex-shrink:0}
.drive.expanded .drive-chevron{transform:rotate(90deg)}
/* Expanded detail */
.drive-detail{max-height:0;overflow:hidden;transition:max-height 0.35s ease}
.drive.expanded .drive-detail{max-height:2000px}
.drive-detail-inner{border-top:1px solid var(--border);padding:16px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px;margin-bottom:16px}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr}}
.detail-item{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.detail-label{color:var(--text2)}
.detail-value{font-weight:500;font-family:'SF Mono','Cascadia Code',monospace;font-size:11px}
.detail-value.val-bad{color:var(--red)}.detail-value.val-warn{color:var(--amber)}.detail-value.val-ok{color:var(--green)}
/* Backblaze info box */
.bb-box{background:var(--elevated);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;font-size:12px;line-height:1.6}
.bb-title{font-weight:600;color:var(--text);margin-bottom:4px;font-size:13px}
.bb-row{display:flex;justify-content:space-between;padding:2px 0}
.bb-label{color:var(--text2)}
.bb-value{font-weight:600}
/* SMART table */
.smart-section{margin-bottom:32px}
.smart-section-title{font-size:16px;font-weight:600;margin-bottom:12px}
.smart-table{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;border-collapse:collapse;font-size:12px}
.smart-table th{background:var(--elevated);color:var(--text2);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.smart-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.04)}
.smart-table tr:last-child td{border-bottom:none}
.smart-table tr:hover td{background:rgba(255,255,255,0.02)}
.mono{font-family:'SF Mono','Cascadia Code',monospace;font-size:11px}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;min-width:0}
.chart-card canvas{display:block;margin:0 auto}
.chart-label{font-size:12px;color:var(--text2);margin-bottom:8px}
.system-section{margin-bottom:28px}
.system-section-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:800px){.chart-row{grid-template-columns:1fr}}
.loading{text-align:center;padding:40px;color:var(--text2)}

/* Capacity forecast */
.forecast-section{margin-bottom:28px}
.forecast-section-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}
.forecast-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
@media(max-width:600px){.forecast-grid{grid-template-columns:1fr}}
.forecast-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.fc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fc-mount{font-size:13px;font-weight:600}
.fc-label{font-size:10px;color:var(--text3)}
.fc-urg{font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px}
.fc-urg.critical{background:rgba(220,38,38,0.12);color:var(--red)}
.fc-urg.warning{background:rgba(217,119,6,0.12);color:var(--amber)}
.fc-urg.ok{background:rgba(34,197,94,0.1);color:var(--green)}
.fc-bar-track{width:100%;height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;margin-bottom:8px}
body.theme-clean .fc-bar-track{background:rgba(0,0,0,0.06)}
.fc-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease}
.fc-bar-projected{height:100%;border-radius:4px;opacity:0.3;position:relative;top:-8px}
.fc-stats{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--text2)}
.fc-stat-val{font-weight:600;color:var(--text);font-family:var(--font-mono)}
.fc-days{font-family:var(--font-mono);font-size:12px;font-weight:600;margin-top:6px}
.fc-nodata{text-align:center;padding:20px;color:var(--text3);font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}

/* Clean theme overrides */
body.theme-clean .drive-clickable:hover{border-color:rgba(0,0,0,0.15)}
body.theme-clean .detail-item{border-bottom-color:rgba(0,0,0,0.06)}
body.theme-clean .smart-table td{border-bottom-color:rgba(0,0,0,0.06)}
body.theme-clean .smart-table tr:hover td{background:rgba(0,0,0,0.02)}
body.theme-clean .drive-detail-inner{border-top-color:rgba(0,0,0,0.08)}
body.theme-clean .bb-box{background:var(--elevated);border-color:rgba(0,0,0,0.08)}
body.theme-clean .badge{border:1px solid rgba(0,0,0,0.06)}
body.theme-clean a{color:var(--accent)}

/* Sort pill inline (stats page doesn't use shared.css for dashboards) */
.sort-bar{display:inline-flex;gap:1px;padding:0;border-radius:6px;background:none;border:none}
.sort-pill{padding:4px 10px;border:none;border-radius:4px;font-size:10px;font-weight:600;font-family:inherit;color:rgba(255,255,255,0.25);background:none;cursor:pointer;transition:all 0.12s;text-transform:uppercase;letter-spacing:0.3px;outline:none;-webkit-appearance:none;appearance:none}
.sort-pill:hover{color:rgba(255,255,255,0.5);background:rgba(255,255,255,0.06)}
.sort-pill.active{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.08)}
body.theme-clean .sort-pill{color:rgba(0,0,0,0.25)}
body.theme-clean .sort-pill:hover{color:rgba(0,0,0,0.5);background:rgba(0,0,0,0.04)}
body.theme-clean .sort-pill.active{color:rgba(0,0,0,0.7);background:rgba(0,0,0,0.06)}
</style>
</head>
<body>
<div class="stats-container">
  <div class="header">
    <div class="header-left">
      <a href="/" class="logo" style="text-decoration:none;color:inherit"><img src="/icon.png" alt="">NAS Doctor</a><span class="logo-slogan">Sleep tight knowing your server never does.</span>
      <span class="page-title">Stats</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/alerts" class="nav-link">Alerts</a>
      <a href="/service-checks" class="nav-link">Services</a>
      <a href="/stats" class="nav-link active">Stats</a>
      <a href="/fleet" class="nav-link">Fleet</a>
      <a href="/replacement-planner" class="nav-link">Planner</a>
      <a href="/settings" class="nav-link" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
      <a href="https://github.com/mcdays94/nas-doctor" class="nav-link" target="_blank" title="GitHub"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .1-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.02 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg></a>
    </div>
  </div>
  <div id="app"><div class="loading">Loading...</div></div>
</div>
<script src="/js/charts.js"></script>
<script>
fetch("/api/v1/status").then(function(r){return r.json()}).then(function(d){if(d.hostname)document.title="NAS Doctor — "+d.hostname;}).catch(function(){});
(function() {
  var snapshot = null, sparklines = null, processHistory = null, expandedIdx = -1, processHours = 24;
  function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

  /* ── Backblaze thresholds (mirrors backblaze_thresholds.go) ── */
  function bbReallocTier(n) {
    if (n <= 0) return null;
    if (n <= 4) return { mult: 2.5, label: "Elevated risk" };
    if (n <= 19) return { mult: 5.0, label: "High risk" };
    if (n <= 99) return { mult: 8.0, label: "Very high risk" };
    return { mult: 12.0, label: "Extreme risk" };
  }
  function bbPendingTier(n) {
    if (n <= 0) return null;
    if (n <= 4) return { mult: 4.0, label: "Active media degradation" };
    if (n <= 19) return { mult: 8.0, label: "Significant media failure" };
    return { mult: 15.0, label: "Severe media failure" };
  }
  function bbAgeTier(h) {
    if (h <= 13000) return { mult: 1.5, label: "Infant period (burn-in)", bracket: "0–1.5 years" };
    if (h <= 35000) return { mult: 1.0, label: "Prime operating years", bracket: "1.5–4 years" };
    if (h <= 44000) return { mult: 1.3, label: "Entering higher-risk bracket", bracket: "4–5 years" };
    if (h <= 61000) return { mult: 1.8, label: "Failure rate rising", bracket: "5–7 years" };
    return { mult: 2.5, label: "Plan replacement", bracket: "7+ years" };
  }
  function bbTempTier(t) {
    if (t <= 34) return { mult: 1.0, label: "Optimal" };
    if (t <= 39) return { mult: 1.0, label: "Normal" };
    if (t <= 44) return { mult: 1.5, label: "Warm" };
    if (t <= 49) return { mult: 2.0, label: "Elevated" };
    if (t <= 54) return { mult: 3.0, label: "Hot" };
    if (t <= 59) return { mult: 5.0, label: "Dangerous" };
    return { mult: 10.0, label: "Critical thermal" };
  }
  function estimatedLife(h) {
    /* Average HDD life per Backblaze: ~5-6 years. Median failure around 50,000 hours. */
    var avgLifeH = 50000;
    var remaining = Math.max(0, avgLifeH - h);
    var remainY = remaining / 8766;
    return { avgYears: 5.7, remainingYears: remainY, percentUsed: Math.min(100, (h / avgLifeH) * 100) };
  }

  function healthScore(d) {
    var score = 100;
    if (!d.health_passed) score -= 50;
    if (d.reallocated_sectors > 0) { var t = bbReallocTier(d.reallocated_sectors); score -= Math.min(36, t.mult * 3); }
    if (d.pending_sectors > 0) { var t = bbPendingTier(d.pending_sectors); score -= Math.min(38, t.mult * 2.5); }
    if (d.udma_crc_errors > 0) score -= (d.udma_crc_errors > 200 ? 10 : d.udma_crc_errors > 50 ? 6 : 3);
    if (d.command_timeout > 0) score -= (d.command_timeout > 100 ? 15 : d.command_timeout > 25 ? 8 : 3);
    var tt = bbTempTier(d.temperature_c || 0); score -= (tt.mult - 1) * 4;
    var at = bbAgeTier(d.power_on_hours || 0); score -= (at.mult - 1) * 5;
    return Math.max(0, Math.round(score));
  }
  function scoreClass(s) { return s >= 80 ? "score-good" : s >= 50 ? "score-warn" : "score-crit"; }
  function valClass(v, w, c) { return v >= c ? "val-bad" : v >= w ? "val-warn" : "val-ok"; }
  function formatHours(h) { if (!h) return "0h"; var y = Math.floor(h/8766), d = Math.floor((h%8766)/24); return y > 0 ? y+"y "+d+"d" : Math.floor(h/24)+"d "+(h%24)+"h"; }
  function formatSize(gb) { return !gb ? "?" : gb >= 1000 ? (gb/1000).toFixed(1)+" TB" : gb.toFixed(0)+" GB"; }

  function render() {
    var app = document.getElementById("app");
    var smart = (snapshot && snapshot.smart) ? snapshot.smart : [];
    if (!smart.length) { app.innerHTML = '<div class="loading">No SMART data available. Run a scan first.</div>'; return; }
    var sorted = smart.slice().sort(function(a,b){ return healthScore(a) - healthScore(b); });
    var h = "";
    // Summary
    var total = smart.length, healthy = 0, warn = 0, crit = 0;
    for (var x = 0; x < smart.length; x++) { var sc = healthScore(smart[x]); if (sc >= 80) healthy++; else if (sc >= 50) warn++; else crit++; }
    var totalTB = smart.reduce(function(s,d){return s+(d.size_gb||0)},0)/1000;
    var avgTemp = smart.reduce(function(s,d){return s+(d.temperature_c||0)},0)/smart.length;
    h += '<div class="summary">';
    h += '<div class="summary-box"><div class="summary-val">'+total+'</div><div class="summary-label">Drives</div></div>';
    h += '<div class="summary-box"><div class="summary-val val-green">'+healthy+'</div><div class="summary-label">Healthy</div></div>';
    if (warn) h += '<div class="summary-box"><div class="summary-val val-amber">'+warn+'</div><div class="summary-label">Warning</div></div>';
    if (crit) h += '<div class="summary-box"><div class="summary-val val-red">'+crit+'</div><div class="summary-label">Critical</div></div>';
    h += '<div class="summary-box"><div class="summary-val">'+totalTB.toFixed(1)+' TB</div><div class="summary-label">Total Storage</div></div>';
    h += '<div class="summary-box"><div class="summary-val">'+avgTemp.toFixed(0)+'&deg;C</div><div class="summary-label">Avg Temp</div></div>';
    h += '</div>';

    // Sort & filter controls
    var statsSortPref = (window.NasSort ? NasSort.getPrefs().statsDrives : null) || "health";
    var statsFilter = window._statsFilter || null;
    h += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
    h += '<div id="stats-sort-mount"></div>';
    // Filter pills
    function statsFPill(key, label, count, color) {
      if (count === 0) return '';
      var isActive = statsFilter === key;
      var s = 'font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;cursor:pointer;transition:all 0.12s;border:1px solid transparent;';
      if (isActive) s += 'color:#fff;background:' + color + ';border-color:' + color + ';';
      else s += 'color:' + color + ';background:' + color + '22;';
      return '<span style="' + s + '" onclick="window._filterStatsDrives(\'' + key + '\')">' + count + ' ' + label + '</span>';
    }
    h += statsFPill('healthy', 'healthy', healthy, '#27a644');
    h += statsFPill('warning', 'warning', warn, '#d97706');
    h += statsFPill('critical', 'critical', crit, '#dc2626');
    if (statsFilter) h += '<span style="font-size:10px;color:var(--text2);cursor:pointer;padding:2px 6px" onclick="window._filterStatsDrives(null)">Clear</span>';
    h += '</div>';

    // Apply sort
    if (window.NasSort) {
      if (statsSortPref === "health") sorted.sort(function(a,b){ return healthScore(a) - healthScore(b); });
      else if (statsSortPref === "temp") sorted.sort(function(a,b){ return (b.temperature_c||0) - (a.temperature_c||0); });
      else if (statsSortPref === "age") sorted.sort(function(a,b){ return (b.power_on_hours||0) - (a.power_on_hours||0); });
      else if (statsSortPref === "size") sorted.sort(function(a,b){ return (b.size_gb||0) - (a.size_gb||0); });
      else if (statsSortPref === "device") sorted.sort(function(a,b){ return (a.device||"").localeCompare(b.device||""); });
    }
    // Apply filter
    if (statsFilter) {
      sorted = sorted.filter(function(d) {
        var sc = healthScore(d);
        if (statsFilter === "healthy") return sc >= 80;
        if (statsFilter === "warning") return sc >= 50 && sc < 80;
        if (statsFilter === "critical") return sc < 50;
        return true;
      });
    }

    // System metrics (first section)
    var sys = (sparklines && sparklines.system) ? sparklines.system : [];
    if (sys.length > 168) sys = sys.slice(sys.length - 168);
    if (sys.length >= 1) {
      h += '<div class="system-section"><div class="system-section-title">System Metrics (last '+sys.length+' data points)</div>';
      h += '<div class="chart-row">';
      h += '<div class="chart-card"><div class="chart-label">CPU Usage (%)</div><canvas id="chart-cpu" width="600" height="140" style="width:100%;height:140px"></canvas></div>';
      h += '<div class="chart-card"><div class="chart-label">Memory Usage (%)</div><canvas id="chart-mem" width="600" height="140" style="width:100%;height:140px"></canvas></div>';
      h += '</div><div class="chart-row">';
      h += '<div class="chart-card"><div class="chart-label">I/O Wait (%)</div><canvas id="chart-io" width="600" height="140" style="width:100%;height:140px"></canvas></div>';
      h += '<div class="chart-card"><div class="chart-label">Load Average</div><canvas id="chart-load" width="600" height="140" style="width:100%;height:140px"></canvas></div>';
      h += '</div></div>';
    }

    // Process CPU History section
    h += renderProcessHistory();

    // Capacity forecast section
    h += renderForecast();

    // Drive list
    h += '<div class="drives">';
    for (var i = 0; i < sorted.length; i++) {
      var d = sorted[i], score = healthScore(d), scCls = scoreClass(score);
      var isExp = (i === expandedIdx);
      h += '<div class="drive drive-clickable'+(isExp?" expanded":"")+'" data-idx="'+i+'">';
      h += '<div class="drive-row" onclick="window._toggleDrive('+i+')">';
      h += '<div class="drive-score '+scCls+'">'+score+'</div>';
      h += '<div class="drive-info">';
      h += '<div class="drive-name">'+esc(d.device)+(d.array_slot?' <span style="color:var(--text3)">('+esc(d.array_slot)+')</span>':'')+'</div>';
      h += '<div class="drive-model">'+esc(d.model)+'</div>';
      h += '<div class="drive-meta">';
      h += '<span>'+formatSize(d.size_gb)+'</span>';
      h += '<span>'+esc(d.disk_type||"hdd")+'</span>';
      h += '<span>'+(d.temperature_c||0)+'&deg;C</span>';
      h += '<span>'+formatHours(d.power_on_hours)+'</span>';
      h += '</div>';
      h += '</div>';
      h += '<div class="drive-badges">';
      if (!d.health_passed) h += '<span class="badge badge-crit">FAILED</span>';
      if (d.reallocated_sectors > 0) h += '<span class="badge badge-warn">'+d.reallocated_sectors+' realloc</span>';
      if (d.pending_sectors > 0) h += '<span class="badge badge-crit">'+d.pending_sectors+' pending</span>';
      if (d.udma_crc_errors > 0) h += '<span class="badge badge-warn">'+d.udma_crc_errors+' CRC</span>';
      h += '</div>';
      h += '<span class="drive-chevron">&#x276F;</span>';
      h += '</div>';
      // Detail panel
      h += '<div class="drive-detail"><div class="drive-detail-inner">';
      // Backblaze risk assessment
      var age = bbAgeTier(d.power_on_hours||0);
      var temp = bbTempTier(d.temperature_c||0);
      var life = estimatedLife(d.power_on_hours||0);
      h += '<div class="bb-box">';
      h += '<div class="bb-title">Backblaze Risk Assessment (Q4-2025, 337k+ drives)</div>';
      h += '<div class="bb-row"><span class="bb-label">Health Score</span><span class="bb-value '+scCls.replace("score-","val-")+'">'+score+' / 100</span></div>';
      h += '<div class="bb-row"><span class="bb-label">Age Bracket</span><span class="bb-value">'+age.bracket+' — '+age.label+'</span></div>';
      h += '<div class="bb-row"><span class="bb-label">Age Failure Multiplier</span><span class="bb-value">'+age.mult.toFixed(1)+'x baseline</span></div>';
      h += '<div class="bb-row"><span class="bb-label">Temperature Rating</span><span class="bb-value">'+temp.label+' ('+temp.mult.toFixed(1)+'x failure rate)</span></div>';
      h += '<div class="bb-row"><span class="bb-label">Estimated Life Used</span><span class="bb-value">'+life.percentUsed.toFixed(0)+'% (avg HDD life: ~'+life.avgYears+' years)</span></div>';
      h += '<div class="bb-row"><span class="bb-label">Est. Remaining Life</span><span class="bb-value '+(life.remainingYears < 1 ? "val-red" : life.remainingYears < 2 ? "val-amber" : "")+'">~'+life.remainingYears.toFixed(1)+' years at current usage</span></div>';
      var rt = bbReallocTier(d.reallocated_sectors);
      if (rt) h += '<div class="bb-row"><span class="bb-label">Reallocated Sector Risk</span><span class="bb-value val-warn">'+rt.label+' ('+rt.mult+'x failure rate)</span></div>';
      var pt = bbPendingTier(d.pending_sectors);
      if (pt) h += '<div class="bb-row"><span class="bb-label">Pending Sector Risk</span><span class="bb-value val-red">'+pt.label+' ('+pt.mult+'x failure rate)</span></div>';
      h += '</div>';
      // Temp chart
      h += '<div style="margin-bottom:14px"><div style="font-size:12px;color:var(--text2);margin-bottom:6px">Temperature History</div>';
      h += '<canvas id="temp-chart-'+i+'" width="600" height="120" style="width:100%;height:120px"></canvas></div>';
      // SMART attributes
      h += '<div class="detail-grid">';
      var attrs = [
        ["Model", esc(d.model), ""],
        ["Serial", esc(d.serial), "mono"],
        ["Firmware", esc(d.firmware), "mono"],
        ["Capacity", formatSize(d.size_gb), ""],
        ["Type", esc(d.disk_type||"HDD"), ""],
        ["ATA Port", esc(d.ata_port), "mono"],
        ["Array Slot", esc(d.array_slot||"—"), ""],
        ["SMART Health", d.health_passed?"PASSED":"FAILED", d.health_passed?"val-ok":"val-bad"],
        ["Power-On Hours", (d.power_on_hours||0).toLocaleString()+" h ("+formatHours(d.power_on_hours)+")", ""],
        ["Temperature", (d.temperature_c||0)+"°C (max: "+(d.temperature_max_c||0)+"°C)", valClass(d.temperature_c||0,45,55)],
        ["Reallocated Sectors", (d.reallocated_sectors||0)+"", valClass(d.reallocated_sectors||0,1,20)],
        ["Pending Sectors", (d.pending_sectors||0)+"", valClass(d.pending_sectors||0,1,5)],
        ["Offline Uncorrectable", (d.offline_uncorrectable||0)+"", valClass(d.offline_uncorrectable||0,1,5)],
        ["UDMA CRC Errors", (d.udma_crc_errors||0)+"", valClass(d.udma_crc_errors||0,1,100)],
        ["Command Timeout", (d.command_timeout||0)+"", valClass(d.command_timeout||0,6,100)],
        ["Spin Retry Count", (d.spin_retry_count||0)+"", valClass(d.spin_retry_count||0,1,5)],
        ["Raw Read Error Rate", (d.raw_read_error_rate||0)+"", "mono"],
        ["Seek Error Rate", (d.seek_error_rate||0)+"", "mono"]
      ];
      for (var a = 0; a < attrs.length; a++) {
        h += '<div class="detail-item"><span class="detail-label">'+attrs[a][0]+'</span><span class="detail-value '+attrs[a][2]+'">'+attrs[a][1]+'</span></div>';
      }
      h += '</div>';
      h += '<div style="text-align:right"><a href="/disk/'+encodeURIComponent(d.serial||'')+'" style="font-size:12px;color:var(--accent)">Full disk detail page &rarr;</a></div>';
      h += '</div></div>'; // detail-inner, detail
      h += '</div>'; // drive
    }
    h += '</div>';
    // SMART comparison table
    h += '<div class="smart-section"><div class="smart-section-title">SMART Comparison — All Drives</div>';
    h += '<div style="overflow-x:auto"><table class="smart-table">';
    h += '<thead><tr><th>Device</th><th>Model</th><th>Health</th><th>Score</th><th>Temp</th><th>Age</th><th>Realloc</th><th>Pending</th><th>CRC</th><th>Cmd TO</th><th>Offline</th></tr></thead><tbody>';
    for (var j = 0; j < sorted.length; j++) {
      var dd = sorted[j], s2 = healthScore(dd), sCls = s2>=80?"val-ok":s2>=50?"val-warn":"val-bad";
      h += '<tr><td><strong>'+esc(dd.device)+'</strong></td>';
      h += '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(dd.model)+'</td>';
      h += '<td class="'+(dd.health_passed?"val-ok":"val-bad")+'">'+(dd.health_passed?"PASS":"FAIL")+'</td>';
      h += '<td class="'+sCls+'" style="font-weight:600">'+s2+'</td>';
      h += '<td class="'+valClass(dd.temperature_c||0,45,55)+'">'+(dd.temperature_c||0)+'°</td>';
      h += '<td>'+formatHours(dd.power_on_hours)+'</td>';
      h += '<td class="'+valClass(dd.reallocated_sectors||0,1,20)+'">'+(dd.reallocated_sectors||0)+'</td>';
      h += '<td class="'+valClass(dd.pending_sectors||0,1,5)+'">'+(dd.pending_sectors||0)+'</td>';
      h += '<td class="'+valClass(dd.udma_crc_errors||0,1,100)+'">'+(dd.udma_crc_errors||0)+'</td>';
      h += '<td class="'+valClass(dd.command_timeout||0,6,100)+'">'+(dd.command_timeout||0)+'</td>';
      h += '<td class="'+valClass(dd.offline_uncorrectable||0,1,5)+'">'+(dd.offline_uncorrectable||0)+'</td></tr>';
    }
    h += '</tbody></table></div></div>';
    app.innerHTML = h;
    drawCharts();
  }

  function drawCharts() {
    if (!window.NasChart) return;
    var sys = (sparklines && sparklines.system) ? sparklines.system : [];
    if (sys.length > 168) sys = sys.slice(sys.length - 168);
    var disks = (sparklines && sparklines.disks) ? sparklines.disks : [];
    var smart = (snapshot && snapshot.smart) ? snapshot.smart.slice().sort(function(a,b){return healthScore(a)-healthScore(b)}) : [];
    if (sys.length >= 1) {
      // Duplicate single point so charts can draw a line
      if (sys.length === 1) sys = [sys[0], sys[0]];
      var lb = sys.map(function(p,i){return i});
      try { NasChart.area("chart-cpu",{datasets:[{data:sys.map(function(p){return p.cpu_usage}),color:"#5e6ad2",label:"CPU"}],labels:lb,yLabel:"%"}); } catch(e){}
      try { NasChart.area("chart-mem",{datasets:[{data:sys.map(function(p){return p.mem_percent}),color:"#7170ff",label:"Memory"}],labels:lb,yLabel:"%"}); } catch(e){}
      try { NasChart.area("chart-io",{datasets:[{data:sys.map(function(p){return p.io_wait}),color:"#f59e0b",label:"I/O Wait"}],labels:lb,yLabel:"%"}); } catch(e){}
      try { NasChart.line("chart-load",{datasets:[{data:sys.map(function(p){return p.load_avg_1}),color:"#22c55e",label:"Load 1m"}],labels:lb}); } catch(e){}
    }
    for (var i = 0; i < smart.length; i++) {
      var el = document.getElementById("temp-chart-"+i);
      if (!el || !el.offsetParent) continue; // skip hidden canvases
      var serial = smart[i].serial||"";
      for (var d = 0; d < disks.length; d++) {
        if (disks[d].serial === serial && disks[d].temps && disks[d].temps.length >= 2) {
          var temps = disks[d].temps.map(function(p){return p.temp});
          var mx = Math.max.apply(null,temps);
          var clr = mx>=55?"#ef4444":mx>=45?"#f59e0b":"#22c55e";
          try { NasChart.area("temp-chart-"+i,{datasets:[{data:temps,color:clr,label:"Temp"}],labels:temps.map(function(v,k){return k}),yLabel:"\u00B0C"}); } catch(e){}
          break;
        }
      }
    }
    // Process CPU chart
    drawProcessChart();
  }

  window._toggleDrive = function(idx) {
    expandedIdx = (expandedIdx === idx) ? -1 : idx;
    render(); // re-render to collapse others and expand target
  };

  /* Apply theme */
  (function(){
    try {
      var t = localStorage.getItem("nas-doctor-theme");
      if (t === "clean") document.body.classList.add("theme-"+t);
    } catch(e) {}
    fetch("/api/v1/settings").then(function(r){return r.json()}).then(function(d){
      if (d.theme === "clean") {
        document.body.className = "theme-"+d.theme;
      }
      try { localStorage.setItem("nas-doctor-theme", d.theme); } catch(e){}
    }).catch(function(){});
  })();

  window._statsFilter = null;
  window._filterStatsDrives = function(key) {
    window._statsFilter = (window._statsFilter === key) ? null : key;
    render();
  };

  function initStatsSortBar() {
    if (!window.NasSort) return;
    var prefs = NasSort.getPrefs();
    var mount = document.getElementById("stats-sort-mount");
    if (!mount) return;
    NasSort.renderSortBar({
      container: mount,
      options: [
        { key: "health", label: "Health" },
        { key: "temp", label: "Temp" },
        { key: "age", label: "Age" },
        { key: "size", label: "Size" },
        { key: "device", label: "Device" }
      ],
      active: prefs.statsDrives || "health",
      onSort: function(key) { prefs.statsDrives = key; NasSort.savePrefs(prefs); render(); initStatsSortBar(); }
    });
  }

  // ── Process CPU History chart helpers ──
  var processChartColors = ["#5e6ad2","#22c55e","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#f97316","#14b8a6","#a855f7"];

  function renderProcessHistory() {
    if (!processHistory || processHistory.length === 0) return '';
    // Group by (name, container_name) identity key.
    var groups = {};
    for (var i = 0; i < processHistory.length; i++) {
      var p = processHistory[i];
      var key = p.name + '|' + (p.container_name || '');
      if (!groups[key]) groups[key] = { name: p.name, container: p.container_name || '', points: [], total: 0 };
      groups[key].points.push(p);
      groups[key].total += p.cpu_percent;
    }
    // Check for highlighted process from query params (?process=name&container=ctr)
    var urlParams = new URLSearchParams(window.location.search);
    var highlightProc = urlParams.get('process') || '';
    var highlightCtr = urlParams.get('container') || '';
    var highlightKey = highlightProc ? (highlightProc + '|' + highlightCtr) : '';

    // Rank by cumulative CPU and take top 8.
    var ranked = Object.keys(groups).map(function(k) { return groups[k]; });
    ranked.sort(function(a, b) { return b.total - a.total; });
    // If a specific process is highlighted, ensure it's included and first.
    if (highlightKey && groups[highlightKey]) {
      ranked = ranked.filter(function(r) { return (r.name + '|' + r.container) !== highlightKey; });
      ranked.unshift(groups[highlightKey]);
    }
    ranked = ranked.slice(0, 8);
    if (ranked.length === 0) return '';
    var title = highlightProc
      ? esc(highlightProc) + (highlightCtr ? ' (' + esc(highlightCtr) + ')' : ' (host)') + ' — CPU Load (per-core %)'
      : 'Process CPU Load (top ' + ranked.length + ' by cumulative core-time)';
    var h = '<div class="system-section" id="process-history">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
    h += '<div class="system-section-title" style="margin-bottom:0">' + title + '</div>';
    h += '<div style="display:flex;gap:4px">';
    var ranges = [{h:1,l:"1H"},{h:24,l:"1D"},{h:168,l:"1W"},{h:720,l:"1M"}];
    for (var ri = 0; ri < ranges.length; ri++) {
      var rng = ranges[ri];
      var active = processHours === rng.h;
      h += '<button onclick="window._loadProcessRange(' + rng.h + ')" style="font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);background:' + (active ? 'var(--bg-elevated)' : 'transparent') + ';color:' + (active ? 'var(--text2)' : 'var(--text3)') + ';cursor:pointer">' + rng.l + '</button>';
    }
    h += '</div></div>';
    h += '<div class="chart-card"><div class="chart-label">CPU Load per Process (% of 1 core; up to N×100% on multi-core)</div>';
    h += '<canvas id="chart-process-cpu" width="600" height="200" style="width:100%;height:200px"></canvas>';
    h += '<div style="font-size:11px;color:var(--text3);margin-top:4px">100% = one CPU core fully busy. A process using N cores can reach N×100%.</div></div>';
    // Legend
    h += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;padding:0 4px">';
    for (var j = 0; j < ranked.length; j++) {
      var label = ranked[j].name + (ranked[j].container ? ' (' + esc(ranked[j].container) + ')' : ' (host)');
      var clr = processChartColors[j % processChartColors.length];
      var isHighlighted = highlightKey && (ranked[j].name + '|' + ranked[j].container) === highlightKey;
      var weight = isHighlighted ? 'font-weight:700' : '';
      h += '<div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);' + weight + '">';
      h += '<span style="display:inline-block;width:' + (isHighlighted ? '10' : '8') + 'px;height:' + (isHighlighted ? '10' : '8') + 'px;border-radius:50%;background:' + clr + '"></span>';
      h += esc(label) + '</div>';
    }
    h += '</div></div>';
    return h;
  }

  function drawProcessChart() {
    if (!window.NasChart || !processHistory || processHistory.length === 0) return;
    var el = document.getElementById("chart-process-cpu");
    if (!el) return;
    // Group by (name, container_name).
    var groups = {};
    var timestamps = [];
    var tsSet = {};
    for (var i = 0; i < processHistory.length; i++) {
      var p = processHistory[i];
      var key = p.name + '|' + (p.container_name || '');
      if (!groups[key]) groups[key] = { name: p.name, container: p.container_name || '', byTs: {}, total: 0 };
      // Bucket by minute — parse to Date then round down to the minute.
      var d = new Date(p.timestamp);
      if (isNaN(d.getTime())) continue;
      d.setSeconds(0, 0);
      var ts = d.toISOString();
      if (!tsSet[ts]) { tsSet[ts] = true; timestamps.push(ts); }
      // Take the max CPU per time bucket per group (in case of duplicates).
      if (!groups[key].byTs[ts] || p.cpu_percent > groups[key].byTs[ts]) {
        groups[key].byTs[ts] = p.cpu_percent;
      }
      groups[key].total += p.cpu_percent;
    }
    timestamps.sort();
    // Rank and take top 8.
    var ranked = Object.keys(groups).map(function(k) { return groups[k]; });
    ranked.sort(function(a, b) { return b.total - a.total; });
    ranked = ranked.slice(0, 8);
    if (ranked.length === 0 || timestamps.length === 0) return;
    // Build datasets.
    var datasets = [];
    for (var j = 0; j < ranked.length; j++) {
      var g = ranked[j];
      var data = [];
      for (var t = 0; t < timestamps.length; t++) {
        data.push(g.byTs[timestamps[t]] || 0);
      }
      var label = g.name + (g.container ? ' (' + g.container + ')' : ' (host)');
      datasets.push({ data: data, color: processChartColors[j % processChartColors.length], label: label });
    }
    // Format time labels: show HH:MM, thin out to ~20 visible labels max.
    var step = Math.max(1, Math.floor(timestamps.length / 20));
    var labels = timestamps.map(function(ts, idx) {
      if (idx % step !== 0 && idx !== timestamps.length - 1) return '';
      var d = new Date(ts);
      if (isNaN(d.getTime())) return '';
      return ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
    });
    try { NasChart.line("chart-process-cpu", { datasets: datasets, labels: labels, yLabel: "% / core" }); } catch(e) {}
  }

  var capacityForecast = null;

  function renderForecast(){
    if(!capacityForecast||!capacityForecast.volumes||capacityForecast.volumes.length===0)return'';
    var h='<div class="forecast-section"><div class="forecast-section-title">Capacity Forecast</div>';
    h+='<div class="forecast-grid">';
    var vols=capacityForecast.volumes;
    // Sort: critical first, then warning, then ok
    vols.sort(function(a,b){var o={critical:0,warning:1,ok:2};return(o[a.urgency]||9)-(o[b.urgency]||9);});
    for(var i=0;i<vols.length;i++){
      var v=vols[i];
      var pct=Math.min(v.current_pct,100);
      var barCol=v.current_pct>=95?"var(--red)":v.current_pct>=85?"var(--amber)":"var(--green)";
      h+='<div class="forecast-card">';
      h+='<div class="fc-header">';
      h+='<div><div class="fc-mount">'+esc(v.mount_point)+'</div><div class="fc-label">'+esc(v.label||v.device)+'</div></div>';
      h+='<span class="fc-urg '+v.urgency+'">'+v.urgency.toUpperCase()+'</span>';
      h+='</div>';
      // Usage bar
      h+='<div class="fc-bar-track"><div class="fc-bar-fill" style="width:'+pct.toFixed(0)+'%;background:'+barCol+'"></div></div>';
      // Stats row
      h+='<div class="fc-stats">';
      h+='<span><span class="fc-stat-val">'+v.current_pct.toFixed(1)+'%</span> used</span>';
      h+='<span><span class="fc-stat-val">'+(v.total_gb>=1000?(v.total_gb/1000).toFixed(1)+" TB":v.total_gb.toFixed(0)+" GB")+'</span> total</span>';
      if(v.growth_gb_per_day>0.01)h+='<span><span class="fc-stat-val">+'+v.growth_gb_per_day.toFixed(1)+'</span> GB/day</span>';
      else if(v.growth_gb_per_day<-0.01)h+='<span><span class="fc-stat-val">'+v.growth_gb_per_day.toFixed(1)+'</span> GB/day</span>';
      else h+='<span>Stable</span>';
      h+='</div>';
      // Days to full
      h+='<div class="fc-days" style="color:'+(v.days_to_100>=0&&v.days_to_100<30?"var(--red)":v.days_to_100>=0&&v.days_to_100<90?"var(--amber)":"var(--green)")+'">';
      if(v.days_to_100===0)h+='Full';
      else if(v.days_to_100>0&&v.days_to_100<365)h+='Full in ~'+v.days_to_100+' days';
      else if(v.days_to_100>=365)h+='Full in ~'+(v.days_to_100/365).toFixed(1)+' years';
      else h+='Not filling';
      if(v.data_points<5)h+=' <span style="font-size:10px;color:var(--text3)">(low data \u2014 '+v.data_points+' points)</span>';
      h+='</div>';
      h+='</div>';
    }
    h+='</div></div>';
    return h;
  }

  Promise.all([
    fetch("/api/v1/snapshot/latest").then(function(r){return r.json()}).catch(function(){return null}),
    fetch("/api/v1/sparklines").then(function(r){return r.json()}).catch(function(){return null}),
    fetch("/api/v1/capacity-forecast").then(function(r){return r.json()}).catch(function(){return null}),
    fetch("/api/v1/history/processes?hours=" + processHours).then(function(r){return r.json()}).catch(function(){return null})
  ]).then(function(r){ snapshot=r[0]; sparklines=r[1]; capacityForecast=r[2]; processHistory=r[3]; render(); initStatsSortBar(); });

  window._loadProcessRange = function(hours) {
    processHours = hours;
    fetch("/api/v1/history/processes?hours=" + hours).then(function(r){return r.json()}).then(function(data) {
      processHistory = data;
      var section = document.getElementById("process-history");
      if (section) {
        var parent = section.parentNode;
        var tmp = document.createElement("div");
        tmp.innerHTML = renderProcessHistory();
        if (tmp.firstChild) {
          parent.replaceChild(tmp.firstChild, section);
          drawProcessChart();
        }
      }
    }).catch(function(){});
  };
})();
</script>
