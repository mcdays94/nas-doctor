<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NAS Doctor — Fleet</title>
<link rel="icon" href="/icon.png">
<link rel="stylesheet" href="/css/shared.css">
<style>
/* Fleet-specific styles */
body{padding:0}
.fleet-container{max-width:1100px;margin:0 auto;padding:24px}
.container{max-width:1100px;margin:0 auto;padding:24px}
/* Fleet-specific: header sizing, grid, fleet cards, health dots */
.header-left img{width:28px;height:28px;border-radius:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.fleet-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color 0.15s}
.fleet-card:hover{border-color:var(--border-hover)}
.fleet-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-name{font-size:15px;font-weight:600}
.card-hostname{font-size:12px;color:var(--text2);margin-top:2px;font-family:var(--font-mono)}
.health-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.health-dot.healthy{background:var(--green)}
.health-dot.warning{background:var(--amber)}
.health-dot.critical{background:var(--red)}
.health-dot.offline{background:var(--text3)}
.stats{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--text2)}
.stat-val{font-weight:600;color:var(--text)}
.findings-row{display:flex;gap:10px;margin-top:10px}
.pill-crit{background:rgba(220,38,38,0.1);color:var(--red)}
.pill-warn{background:rgba(217,119,6,0.1);color:var(--amber)}
.pill-info{background:rgba(94,106,210,0.1);color:var(--accent)}
.error-msg{font-size:12px;color:var(--red);margin-top:8px}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:background 0.15s}
.add-btn:hover{background:var(--accent-hover)}
a.card-link{text-decoration:none;color:inherit;display:block}
</style>
</head>
<body>
<div class="fleet-container">
  <div class="header">
    <div class="header-left">
      <a href="/" class="logo" style="text-decoration:none;color:inherit"><img src="/icon.png" alt="">NAS Doctor</a>
      <span class="page-title">Fleet</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link">Dashboard</a>
      <a href="/alerts" class="nav-link">Alerts</a>
      <a href="/stats" class="nav-link">Stats</a>
      <a href="/fleet" class="nav-link active">Fleet</a>
      <a href="/settings" class="nav-link" title="Settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
      <a href="https://github.com/mcdays94/nas-doctor" class="nav-link" target="_blank" title="GitHub"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .1-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6.02 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg></a>
    </div>
  </div>
  <div id="app"></div>
</div>
<script>
/* Theme detection */
(function(){
  function applyTheme(t){document.body.classList.remove("theme-midnight","theme-clean","theme-ember");document.body.classList.add("theme-"+(t||"midnight"));}
  try{var s=localStorage.getItem("nas-doctor-theme");if(s)applyTheme(s);}catch(e){}
  fetch("/api/v1/settings").then(function(r){return r.json()}).then(function(d){if(d.theme){applyTheme(d.theme);try{localStorage.setItem("nas-doctor-theme",d.theme)}catch(e){}}}).catch(function(){});
})();
(function() {
  function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

  function render(statuses) {
    var app = document.getElementById("app");
    if (!statuses || statuses.length === 0) {
      app.innerHTML = '<div class="empty"><div class="empty-title">No remote servers configured</div><p>Add remote NAS Doctor instances in <a href="/settings" style="color:#5e6ad2">Settings</a> to monitor your fleet from here.</p></div>';
      return;
    }

    var h = '<div class="grid">';
    for (var i = 0; i < statuses.length; i++) {
      var s = statuses[i];
      var healthClass = s.online ? (s.overall_health || "healthy") : "offline";
      var healthLabel = s.online ? (s.overall_health || "unknown") : "offline";
      var url = s.server.url || "#";

      h += '<a class="card-link" href="' + esc(url) + '" target="_blank">';
      h += '<div class="fleet-card">';
      h += '<div class="fleet-card-header">';
      h += '<div><div class="card-name">' + esc(s.server.name || s.hostname || "Unknown") + '</div>';
      if (s.hostname && s.hostname !== s.server.name) h += '<div class="card-hostname">' + esc(s.hostname) + '</div>';
      h += '</div>';
      h += '<div class="health-dot ' + healthClass + '" title="' + esc(healthLabel) + '"></div>';
      h += '</div>';

      if (s.online) {
        h += '<div class="stats">';
        h += '<span>Platform: <span class="stat-val">' + esc(s.platform) + '</span></span>';
        h += '<span>Uptime: <span class="stat-val">' + esc(s.uptime) + '</span></span>';
        h += '</div>';
        if (s.critical_count > 0 || s.warning_count > 0 || s.info_count > 0) {
          h += '<div class="findings-row">';
          if (s.critical_count > 0) h += '<span class="pill pill-crit">' + s.critical_count + ' critical</span>';
          if (s.warning_count > 0) h += '<span class="pill pill-warn">' + s.warning_count + ' warning</span>';
          if (s.info_count > 0) h += '<span class="pill pill-info">' + s.info_count + ' info</span>';
          h += '</div>';
        }
      } else {
        h += '<div class="error-msg">' + esc(s.error || "Offline") + '</div>';
      }

      h += '</div></a>';
    }
    h += '</div>';
    app.innerHTML = h;
  }

  function load() {
    fetch("/api/v1/fleet")
      .then(function(r) { return r.json(); })
      .then(function(data) { render(data); })
      .catch(function() { render([]); });
  }

  load();
  setInterval(load, 60000);
})();
</script>
</body>
</html>
