name: Deploy Demo Worker

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'demo-worker/**'
      - 'internal/api/templates/**'
      - '.github/workflows/demo-deploy.yml'
  workflow_dispatch:

env:
  KV_NAMESPACE_ID: '8a68c1992ad443de8f415f8dc6158428'
  CF_ACCOUNT_ID: '9993650612175c36066a397a94466033'

jobs:
  deploy:
    name: Capture, Seed KV & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build NAS Doctor
        run: go build -o nas-doctor ./cmd/nas-doctor

      - name: Run demo & capture everything
        run: |
          ./nas-doctor --demo &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://localhost:8060/api/v1/health > /dev/null 2>&1 && break
            sleep 1
          done

          # Capture HTML pages into _pages/ (so asset server doesn't bypass Worker)
          mkdir -p demo-worker/captured/_pages demo-worker/captured/api
          curl -sf http://localhost:8060/ -o demo-worker/captured/_pages/midnight.html
          curl -sf http://localhost:8060/theme/clean -o demo-worker/captured/_pages/clean.html
          curl -sf http://localhost:8060/theme/ember -o demo-worker/captured/_pages/ember.html
          curl -sf http://localhost:8060/settings -o demo-worker/captured/_pages/settings.html
          curl -sf http://localhost:8060/alerts -o demo-worker/captured/_pages/alerts.html
          curl -sf http://localhost:8060/fleet -o demo-worker/captured/_pages/fleet.html
          curl -sf http://localhost:8060/stats -o demo-worker/captured/_pages/stats.html
          curl -sf http://localhost:8060/parity -o demo-worker/captured/_pages/parity.html
          curl -sf http://localhost:8060/service-checks -o demo-worker/captured/_pages/service_checks.html
          curl -sf http://localhost:8060/api/v1/report -o demo-worker/captured/_pages/report.html

          # Capture static assets
          curl -sf http://localhost:8060/js/charts.js -o demo-worker/captured/charts.js
          curl -sf http://localhost:8060/css/shared.css -o demo-worker/captured/shared.css

          # Capture ALL API responses (these seed the KV namespace)
          curl -sf http://localhost:8060/api/v1/status -o demo-worker/captured/api/status.json
          curl -sf http://localhost:8060/api/v1/snapshot/latest -o demo-worker/captured/api/snapshot.json
          curl -sf http://localhost:8060/api/v1/settings -o demo-worker/captured/api/settings.json
          curl -sf http://localhost:8060/api/v1/sparklines -o demo-worker/captured/api/sparklines.json
          curl -sf 'http://localhost:8060/api/v1/history/gpu?hours=24' -o demo-worker/captured/api/gpu_history.json
          curl -sf 'http://localhost:8060/api/v1/history/containers?hours=24' -o demo-worker/captured/api/container_history.json
          curl -sf http://localhost:8060/api/v1/history/system -o demo-worker/captured/api/system_history.json
          curl -sf http://localhost:8060/api/v1/alerts -o demo-worker/captured/api/alerts.json
          curl -sf http://localhost:8060/api/v1/service-checks -o demo-worker/captured/api/service_checks.json
          curl -sf http://localhost:8060/api/v1/fleet -o demo-worker/captured/api/fleet.json
          curl -sf http://localhost:8060/api/v1/notifications/log -o demo-worker/captured/api/notifications_log.json
          curl -sf http://localhost:8060/api/v1/incidents/timeline -o demo-worker/captured/api/incidents.json
          curl -sf http://localhost:8060/api/v1/db/stats -o demo-worker/captured/api/db_stats.json
          curl -sf http://localhost:8060/api/v1/disks -o demo-worker/captured/api/disks.json
          curl -sf http://localhost:8060/api/v1/replacement-plan -o demo-worker/captured/api/replacement_plan.json
          curl -sf http://localhost:8060/api/v1/capacity-forecast -o demo-worker/captured/api/capacity_forecast.json
          curl -sf http://localhost:8060/api/v1/smart/trends -o demo-worker/captured/api/smart_trends.json

          echo "Captured $(ls demo-worker/captured/_pages/*.html | wc -l) pages + $(ls demo-worker/captured/api/*.json | wc -l) API responses"
          kill $SERVER_PID 2>/dev/null || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Seed KV with captured API data ──
      - name: Seed KV namespace
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm install -g wrangler
          for f in demo-worker/captured/api/*.json; do
            key="api:unraid:$(basename "$f" .json)"
            echo "Seeding KV: $key ($(wc -c < "$f") bytes)"
            wrangler kv key put --namespace-id=$KV_NAMESPACE_ID --remote "$key" --path "$f"
            # Also seed as base data for the feeder
            wrangler kv key put --namespace-id=$KV_NAMESPACE_ID --remote "seed:unraid:$(basename "$f" .json)" --path "$f"
          done

      # ── Capture version from running binary ──
      - name: Capture version
        run: |
          VERSION=$(curl -sf http://localhost:8060/api/v1/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unknown'))" 2>/dev/null || echo "unknown")
          echo "DEMO_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Captured version: $VERSION"

      # ── Deploy demo Worker ──
      - name: Install demo Worker deps
        working-directory: demo-worker
        run: npm install

      - name: Deploy demo Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          workingDirectory: demo-worker
          command: deploy --var VERSION:${{ env.DEMO_VERSION }}

      # ── Deploy feeder Worker ──
      - name: Install feeder deps
        working-directory: demo-worker/feeder
        run: npm install

      - name: Deploy feeder Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          workingDirectory: demo-worker/feeder
          command: deploy
