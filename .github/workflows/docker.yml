name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Serialize builds per ref. Rapid-fire squash merges to main (or a rebase force-push)
# would previously trigger parallel docker builds, each racing to push `:latest`.
# Whichever PUSH finished last won, which did NOT have to be the latest commit — we
# shipped v0.9.4 with `:latest` stuck on the 3rd-of-5 squash-merge commit for this
# exact reason. `cancel-in-progress: true` guarantees "last push to main wins":
# new push arrives → any running build on the same ref is canceled → new build runs
# to completion → deterministic `:latest`.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Default (fetch-depth:1, fetch-tags:false) leaves `git describe --tags`
          # failing on main branch builds, which silently falls through to
          # VERSION=dev baked into the binary. We need the full history + tags so
          # the "Determine version" step can find the latest v* tag and bake it
          # into the image. This also costs <5s extra on repos this size.
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # Use latest v* git tag as version for main branch builds.
            # --match="v*" is essential: without it, the force-pushed `latest`
            # tag (also pointing at a release commit) races with v0.9.4 for
            # "closest tag" and git picks alphabetically — "latest" < "v0.9.4" —
            # so VERSION gets set to "latest", which is how v0.9.4 shipped with
            # the dashboard footer showing "latest" instead of "0.9.4".
            LATEST_TAG=$(git describe --tags --abbrev=0 --match="v*" 2>/dev/null || echo "dev")
            echo "value=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: go test ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=nightly,enable=${{ github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'rc') }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
          no-cache: true
