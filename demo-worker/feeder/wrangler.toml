name = "nas-doctor-demo-feeder"
main = "src/index.ts"
compatibility_date = "2024-12-30"
account_id = "REDACTED_CF_ACCOUNT_ID"
workers_dev = true

# Run every 5 minutes to keep demo data fresh
[triggers]
crons = ["*/5 * * * *"]

# Same KV namespace as the demo worker
[[kv_namespaces]]
binding = "DEMO_DATA"
id = "REDACTED_KV_NAMESPACE_ID"
