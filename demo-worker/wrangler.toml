name = "nas-doctor-demo"
main = "src/index.ts"
compatibility_date = "2024-12-30"
account_id = "REDACTED_CF_ACCOUNT_ID"
workers_dev = false

[vars]
DEMO_MODE = "true"

[assets]
directory = "./captured"
binding = "ASSETS"

# Custom domain
[[routes]]
pattern = "nasdoctordemo.mdias.info"
custom_domain = true

# KV namespace for demo API data (seeded from real Go binary captures)
[[kv_namespaces]]
binding = "DEMO_DATA"
id = "REDACTED_KV_NAMESPACE_ID"
